spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/collabflow}
    username: ${DB_USERNAME:zakaria}
    password: ${DB_PASSWORD:zakaria}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.value.default.type: com.collabflow.events.model.DomainEvent
        spring.json.trusted.packages: com.collabflow.events.model
    listener:
      ack-mode: record
server:
  port: ${SERVER_PORT:9090}

app:
  jwtSecret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_64_CHAR_RANDOM_SECRET_KEY_HERE}
  jwtExpirationMs: ${JWT_EXPIRATION_MS:3600000}
  jwtRefreshExpirationMs: ${JWT_REFRESH_EXPIRATION_MS:2592000000}  # 30 days
  cookie:
    secure: ${COOKIE_SECURE:true}  # HTTPS-only JWT cookies
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  websocket:
    max-message-size: ${WS_MAX_MESSAGE_SIZE:65536}
  cache:
    ttl-seconds: ${CACHE_TTL_SECONDS:300}
  presence:
    session-ttl-seconds: ${PRESENCE_SESSION_TTL_SECONDS:7200}
    online-ttl-seconds: ${PRESENCE_ONLINE_TTL_SECONDS:7200}
  events:
    topic:
      system: ${KAFKA_TOPIC_SYSTEM:collabflow.system-events}
      dead-letter: ${KAFKA_TOPIC_SYSTEM_DLQ:collabflow.system-events.dlq}
    consumer-groups:
      notification: ${KAFKA_GROUP_NOTIFICATION:notification-service}
      audit: ${KAFKA_GROUP_AUDIT:audit-service}
      analytics: ${KAFKA_GROUP_ANALYTICS:analytics-service}
      email: ${KAFKA_GROUP_EMAIL:email-service}
      activity: ${KAFKA_GROUP_ACTIVITY:activity-feed-service}
    retry:
      max-attempts: ${KAFKA_RETRY_MAX_ATTEMPTS:3}
      backoff-ms: ${KAFKA_RETRY_BACKOFF_MS:1000}

logging:
  level:
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    com.collabflow.security: ${LOG_LEVEL_APP_SECURITY:WARN}
